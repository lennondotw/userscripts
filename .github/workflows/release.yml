name: Release

# Stamp @version on changed userscripts and push the commit back to main.
# Greasy Fork polls each script's Sync URL and republishes when the version
# advances. Pushes from this workflow use the default GITHUB_TOKEN, which
# does NOT trigger downstream workflow runs — so we won't loop.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stamp:
    runs-on: ubuntu-latest
    # Skip our own stamping commits.
    if: github.event.head_commit.author.name != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Stamp versions for changed userscripts
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/stamp-versions.mjs

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m 'chore: stamp userscript versions'
            git push
          else
            echo 'No changes to commit.'
          fi
