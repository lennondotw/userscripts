name: Release

# Stamp @version on changed userscripts and push the commit back to main.
# Greasy Fork polls each script's Sync URL and republishes when the version
# advances.
#
# Push auth: a personal GitHub App (`lennondotw-userscripts-bot`) installed
# only on this repo. The App is in the `main` ruleset's bypass list, which
# lets the stamping commit through without weakening branch protection. The
# default `GITHUB_TOKEN` cannot be bypass-listed on personal repos — only a
# user-owned App or DeployKey can.
#
# Setup is documented in README.md → "First-time setup". The two repo-level
# values needed:
#   - vars.STAMP_BOT_APP_ID         (numeric App ID, not secret)
#   - secrets.STAMP_BOT_PRIVATE_KEY (App's .pem private key)

on:
  push:
    branches: [main]

# We mint our own token below; default GITHUB_TOKEN only needs read.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stamp:
    runs-on: ubuntu-latest
    # Skip the workflow run that *was* the stamping commit. App-token pushes
    # do trigger downstream workflows (unlike GITHUB_TOKEN), so this guard
    # short-circuits the second run after a stamp.
    if: "!endsWith(github.event.head_commit.author.name, '-userscripts-bot[bot]')"
    steps:
      - name: Mint App installation token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.STAMP_BOT_APP_ID }}
          private-key: ${{ secrets.STAMP_BOT_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Stamp versions for changed userscripts
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/stamp-versions.mjs

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
            git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
            git add -A
            git commit -m 'chore: stamp userscript versions'
            git push
          else
            echo 'No changes to commit.'
          fi
